<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vn">

<div th:fragment="image-bepvtit_v1" class="bg-body-tertiary">

<!-- Simple Navbar -->
<nav class="navbar navbar-expand-lg bg-body border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="#">📷 Image Grid</a>
        <span class="navbar-text small text-body-secondary">Bootstrap 5 + Modal Lightbox</span>
    </div>
</nav>

<main class="container pb-5">
    <header class="d-flex align-items-end justify-content-between flex-wrap gap-2 mb-3">
        <div>
            <h1 class="h3 mb-1">Responsive Image Grid</h1>
            <p class="text-body-secondary mb-0">Click any image to open the lightbox. Use ← → keys to navigate.</p>
        </div>
        <div class="d-flex gap-2">
            <button id="toggleTheme" class="btn btn-outline-secondary btn-sm" type="button" aria-label="Toggle theme">Toggle Theme</button>
        </div>
    </header>

    <!-- Grid -->
    <div class="row g-3" id="gallery">

    </div>
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 py-2  rounded bg-light">

        <!-- Bộ chọn số lượng -->
        <div class="d-flex align-items-center gap-2">
            <select id="f-page-size" class="form-select form-select-sm w-auto">
                <option value="10">10 records</option>
                <option value="20">20 records</option>
                <option value="50" selected>50 records</option>
                <option value="100">100 records</option>
            </select>
            <div id="text-muted" class="d-inline-flex align-items-center gap-2">
                <i class="bi bi-list-check text-body-secondary"></i>
                <span class="badge rounded-pill text-bg-primary" id="count-badge">0</span>
                <span class="text-body-secondary" id="count-label">records</span>
            </div>
        </div>


        <!-- Phân trang -->
        <nav>
            <ul class="pagination mb-0" id="pagination">
                <li class="page-item">
                    <a class="page-link" id="btn-pag-prev" data-action="prev">Previous</a>
                </li>
                <li class="page-item">
                    <a class="page-link" id="btn-pag-next" data-action="next" href="#">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</main>

<!-- Lightbox Modal -->
<div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true" aria-labelledby="lightboxTitle">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content bg-body">
            <div class="modal-header">
                <h5 class="modal-title" id="lightboxTitle">Image</h5>
                <div class="btn-group me-2" role="group" aria-label="Prev Next">
                    <button type="button" class="btn btn-outline-secondary btn-sm" id="prevBtn" aria-label="Previous (←)">← Prev</button>
                    <button type="button" class="btn btn-outline-secondary btn-sm" id="nextBtn" aria-label="Next (→)">Next →</button>
                </div>
                <button type="button" class="btn btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <div class="ratio ratio-16x9 bg-body-secondary">
                    <img id="lightboxImage" src="" alt="" class="object-fit-contain w-100 h-100" />
                </div>
            </div>
            <div class="modal-footer justify-content-between">
                <small class="text-body-secondary">Use ← → keys to navigate</small>
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

    <script th:src="@{/js/image/filter.js}" async></script>
    <!-- Bootstrap JS + Popper -->
    <script>
        window.onload = function () {
            handleFilter();
        };
    </script>

<script>
    // 🔨🤖🔧 Lightbox logic with keyboard navigation
    (function () {
        const gallery = document.getElementById('gallery');
        const links = Array.from(gallery.querySelectorAll('.img-link'));
        const modalEl = document.getElementById('lightboxModal');
        const modal = new bootstrap.Modal(modalEl);
        const imgEl = document.getElementById('lightboxImage');
        const titleEl = document.getElementById('lightboxTitle');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let current = 0;

        function updateLightbox(index) {
            const item = links[index];
            if (!item) return;
            current = index;
            const full = item.dataset.full || item.querySelector('img').src;
            const title = item.dataset.title || item.querySelector('figcaption')?.textContent || 'Image';
            imgEl.src = full;
            imgEl.alt = title;
            titleEl.textContent = title;
        }

        // Open modal on click
        links.forEach(a => {
            a.addEventListener('click', (e) => {
                e.preventDefault();
                const idx = Number(a.dataset.index) || links.indexOf(a);
                updateLightbox(idx);
                modal.show();
            });
        });

        function prev() {
            updateLightbox((current - 1 + links.length) % links.length);
        }
        function next() {
            updateLightbox((current + 1) % links.length);
        }

        prevBtn.addEventListener('click', prev);
        nextBtn.addEventListener('click', next);

        // Keyboard arrows while modal is open
        modalEl.addEventListener('shown.bs.modal', () => {
            const onKey = (ev) => {
                if (ev.key === 'ArrowLeft') prev();
                if (ev.key === 'ArrowRight') next();
            };
            window.addEventListener('keydown', onKey);
            modalEl.addEventListener('hidden.bs.modal', () => {
                window.removeEventListener('keydown', onKey);
                // Free up memory/bandwidth
                imgEl.src = '';
            }, { once: true });
        });

        // Simple theme toggle (light/dark/auto)
        (function themeToggle() {
            const btn = document.getElementById('toggleTheme');
            const root = document.documentElement;
            const modes = ['light', 'dark', 'auto'];
            function currentMode() { return localStorage.getItem('bs-theme') || 'auto'; }
            function setMode(mode) {
                localStorage.setItem('bs-theme', mode);
                root.setAttribute('data-bs-theme', mode === 'auto' ? '' : mode);
                btn.textContent = `Theme: ${mode}`;
            }
            setMode(currentMode());
            btn.addEventListener('click', () => {
                const next = modes[(modes.indexOf(currentMode()) + 1) % modes.length];
                setMode(next);
            });
        })();
    })();
</script>
</div>


</html>
