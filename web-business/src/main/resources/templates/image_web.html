<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
      xsi:schemaLocation="http://www.ultraq.net.nz/thymeleaf/layout " lang="en">

<head>
    <title>Trang chủ</title>
    <style>
        /* Subtle zoom on hover */
        .gallery-img {
            transition: transform .25s ease, filter .25s ease;
        }
        .img-link:hover .gallery-img,
        .img-link:focus-visible .gallery-img {
            transform: scale(1.03);
            filter: saturate(1.05);
        }

        /* Reduce motion if requested */
        @media (prefers-reduced-motion: reduce) {
            .gallery-img { transition: none; }
        }

        /* Make captions a touch stronger in dark mode */
        @media (prefers-color-scheme: dark) {
            .figure-caption { color: rgba(255,255,255,.75); }
        }
    </style>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{fragments/image_bepvtit_v1 :: image-bepvtit_v1}"></div>
</section>
</body>

</html>
