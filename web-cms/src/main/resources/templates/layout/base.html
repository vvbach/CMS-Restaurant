<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" lang="vn">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta charset="UTF-8">
    <!--    <title layout:title-pattern="$DECORATOR_TITLE - $CONTENT_TITLE"></title>-->

    <!-- Favicons -->
    <link th:href="@{/img/favicon.png}" rel="icon">
    <link th:href="@{/img/apple-touch-icon.png}" rel="apple-touch-icon">

    <!-- Google Fonts -->
    <link href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Nunito:300,300i,400,400i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

    <!-- Vendor CSS Files -->
    <link th:href="@{/vendor/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/vendor/bootstrap-icons/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/vendor/boxicons/css/boxicons.min.css}" rel="stylesheet">
    <link th:href="@{/vendor/quill/quill.snow.css}" rel="stylesheet">
    <link th:href="@{/vendor/quill/quill.bubble.css}" rel="stylesheet">
    <link th:href="@{/vendor/remixicon/remixicon.css}" rel="stylesheet">
    <link th:href="@{/vendor/simple-datatables/style.css}" rel="stylesheet">

    <!-- Template Main CSS File -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-datatables@latest/dist/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --card-radius: 16px; }
        body { background: #f7f8fa; }
        .app-header { background: #fff; border-bottom: 1px solid #e9ecef; }
        .app-card { border: 0; border-radius: var(--card-radius); box-shadow: 0 6px 18px rgba(0,0,0,.06); }
        .status-badge { font-weight: 600; letter-spacing: .2px; }
        /* Stepper */
        .stepper { display:flex; align-items:center; gap:12px; }
        .stepper .dot { width: 14px; height: 14px; border-radius: 50%; background:#dee2e6; position: relative; flex: 0 0 auto; }
        .stepper .dot.active{ background:#0d6efd; }
        .stepper .dot.done{ background:#20c997; }
        .stepper .line { flex:1; height: 3px; background:#e9ecef; border-radius: 2px; }
        .stepper .line.filled{ background:#20c997; }
        /* Scroll area */
        .h-70vh{ height:70vh; }
        .scroll-y { overflow-y:auto; }
        .btn-ghost { border: none; background: transparent; }
        .btn-ghost:hover { background: rgba(13,110,253,.1); }
        .table-sm td, .table-sm th{ padding:.5rem .65rem; }
        a, u {
            text-decoration: none;
        }
    </style>
    <link th:href="@{/css/utility.css}" rel="stylesheet">
</head>

<!--Hide everything until ready-->
<body style="visibility: hidden;">
    <script th:src="@{/js/roles-and-permissions.js}"></script>
    <div th:replace="~{fragments/header :: header}"></div>
    <div th:replace="~{fragments/nav :: nav(${viewName})}"></div>
    <div th:replace="~{fragments/scripts/main-script :: main-script}"></div>
    <div layout:fragment="content"></div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
