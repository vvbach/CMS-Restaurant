<html xmlns:th="http://www.thymeleaf.org" lang="vn">
<main th:fragment="view-roles" id="main" class="main">
    <section class="section">
        <div class="row">
            <div class="col-lg-12" id="list-data">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="card-title">Danh sách Role</div>
                            <button id="openModalNewBtn" class="btn btn-icon me-1"
                                    data-bs-toggle="modal" data-bs-target="#popup-new">
                                <i class="ri-play-list-add-line fs-5"></i>
                            </button>
                        </div>
                        <div class="tab-content" id="myTabjustifiedContent">
                            <div th:replace="~{/fragments/roles/table-filter :: table-filter}"></div>
                            <div th:replace="~{/fragments/roles/role-table :: role-table}"></div>
                        </div><!-- End Default Tabs -->
                        <div th:replace="~{/fragments/roles/role-pagination :: role-pagination}"></div>
                    </div>
                </div>
            </div>
            <!-- Hiển thị màn hình thông tin chi tiết -->
            <div th:replace="~{/fragments/roles/role-detail :: role-detail}"></div>
        </div>
    </section>
    <!--   popup hiển thị để cập nhật thông tin  -->
    <div th:replace="~{/fragments/roles/popup/update-role-popup :: update-role-popup}"></div>

    <!-- popup thêm mới-->
    <div th:replace="~{/fragments/roles/popup/add-role-popup :: add-role-popup}"></div>

    <!--    Tạo vai trò  -->
    <script th:replace="~{/fragments/roles/javascripts/add-role :: add-role}"></script>

    <!-- Thông tin detail -->
    <script th:replace="~{/fragments/roles/javascripts/view-detail :: view-detail}"></script>

    <!--  Xóa vai trò  -->
    <script th:replace="~{/fragments/roles/javascripts/delete-role :: delete-role}"></script>

    <!-- filter -->
    <script th:replace="~{/fragments/roles/javascripts/filter :: filter}"></script>

    <script th:src="@{/js/page-function/hideRoleBasedEl.js}"></script>

    <script>
        (async () => {
            await window.authReady;
            handleFilter();
            hideAddBtn("UI")
            hideUpdateBtn("UI")
            hideDeleteBtn("UI")
        })();
    </script>
</main>
</html>
