<html xmlns:th="http://www.thymeleaf.org" lang="en">
<div th:fragment="update-role-popup" class="modal fade" id="popup-update" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header px-4">
                <div class="section-title m-0">Update Role</div>
            </div>
            <!-- Body -->
            <div class="modal-body px-4 pb-4">
                <!-- Grid fields -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="input-name-update" class="form-label">Role</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-badge-fill"></i></span>
                            <input type="text" name="name" class="form-control" id="input-name-update">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="input-code-update" class="form-label">Code</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-badge-fill"></i></span>
                            <input type="text" name="code" class="form-control" id="input-code-update">
                        </div>
                    </div>
                    <div class="col-12">
                        <label for="input-description-update" class="form-label">Description</label>
                        <textarea name="description" class="form-control" id="input-description-update"></textarea>
                        <div class="invalid-feedback" id="invalid-feedback-input-description-update">Description is required</div>
                    </div>
                    <div class="col-12" id="updatePermissionsPickerContainer">
                        <label class="form-label">Permissions</label>

                        <div class="card">
                            <div class="card-body">
                                <div class="d-flex mb-2">
                                    <label for="updatePermSearch" class="d-none"></label>
                                    <input id="updatePermSearch" class="form-control me-2"
                                           placeholder="Search permissions by name or code">
                                </div>

                                <div id="updatePermissionsGroups" class="accordion" role="tablist">
                                    <!-- Permission groups (parent -> children) will be rendered here -->
                                    <div id="updatePermissionSpinner" class="text-center text-muted small py-3">Loading permissions...</div>
                                </div>

                                <div class="mt-3 d-flex justify-content-between align-items-center">
                                    <div class="small text-muted">Choose permissions</div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="updatePermSelectAll">
                                        <label class="form-check-label small" for="updatePermSelectAll">Select all</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Hidden input used to collect permission ids when updating role -->
                        <!-- Stored as comma-separated ids: "1,2,3". If backend expects JSON array, parse before submit. -->
                        <input type="hidden" id="updatePermissionIdInputs" name="permission_ids" value="">
                    </div>
                </div>
            </div>
            <!-- Footer -->
            <div class="modal-footer px-4">
                <button type="button" class="btn btn-light border" onclick="closeAllModals()"><i
                        class="bi bi-x-circle"></i> Close
                </button>
                <button type="button" class="btn btn-primary" onclick="closeAllModals()" id="btn-update-detail">
                    <i class="bi bi-check2"></i> Save
                </button>
            </div>
        </div>
    </div>


</div>
</html>
