<html xmlns:th="http://www.thymeleaf.org" lang="en">
<div th:fragment="add-role-popup" class="modal fade clearfix" id="popup-new" tabindex="-1"
     aria-labelledby="myModalLabel" aria-hidden="true">
    <div class="modal-content modal-dialog modal-lg">
        <div class="modal-body">
            <h2 class="card-title mb-0 me-2">Add Role</h2>
            <form id="form-new" class="row g-3">
                <div class="col-12">
                    <label for="input-name-new" class="form-label">Role</label>
                    <input type="text" name="name" class="form-control" id="input-name-new">
                    <div class="invalid-feedback" id="invalid-feedback-input-name-new">Role name is required</div>
                </div>
                <div class="col-12">
                    <label for="input-code-new" class="form-label">Code</label>
                    <input type="text" name="code" class="form-control" id="input-code-new">
                    <div class="invalid-feedback" id="invalid-feedback-input-code-new">Code is required</div>
                </div>
                <div class="col-12">
                    <label for="input-description-new" class="form-label">Description</label>
                    <textarea name="description" class="form-control" id="input-description-new"></textarea>
                    <div class="invalid-feedback" id="invalid-feedback-input-description-new">Description is required</div>
                </div>
                <div class="col-12" id="addPermissionsPickerContainer">
                    <label class="form-label">Permissions</label>

                    <div class="card">
                        <div class="card-body">
                            <div class="d-flex mb-2">
                                <label for="permSearch" class="d-none">Search permissions</label>
                                <input id="permSearch" class="form-control me-2"
                                       placeholder="Search permissions by name or code">
                            </div>

                            <div id="permissionsGroups" class="accordion" role="tablist">
                                <!-- Permission groups (parent -> children) will be rendered here -->
                                <div id="permissionsSpinner" class="text-center text-muted small py-3">Loading permissions...</div>
                            </div>

                            <div class="mt-3 d-flex justify-content-between align-items-center">
                                <div class="small text-muted">Choose permissions</div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="permSelectAll">
                                    <label class="form-check-label small" for="permSelectAll">Select all</label>
                                </div>
                            </div>
                        </div>
                    </div>


                    <input type="hidden" id="permissionIdsInput" name="permission_ids" value="">
                </div>
                <div class="text-center">
                    <button id="btn-new-role" class="btn btn-primary" type="button" data-bs-dismiss="modal">Add
                        Role
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </form>
        </div>
    </div>


</div>
</html>
