<html xmlns:th="http://www.thymeleaf.org" lang="vn">
<script th:fragment="view-detail" th:inline="javascript">
    async function viewDetail(id) {
        showDetailPanel()
        let url = `/v1/api/roles/${id}/detail`
        await callApi(url, {
            method: 'GET',
            headers: {'Content-Type': 'application/json'},
        }, (resp) => {
            const d = resp?.data ?? resp;

            document.getElementById('detail-id').value = d?.id ?? '';
            document.getElementById('detail-name').value = d?.name ?? '';
            document.getElementById('detail-code').value = d?.code ?? '';
            document.getElementById('detail-description').value = d?.description ?? '';
            document.getElementById('detail-is-default').value = d?.default ?? '';
            document.getElementById('detail-is-delete').value = mapIsDelete(d?.isDelete);
            document.getElementById('inputAuthor').value = d?.createdByName || d?.createdBy || '-';
            document.getElementById('inputCreateAt').value = formatDate(d?.createdAt);
            document.getElementById('inputUpdater').value = d?.updatedByName || d?.updatedBy || '-';
            document.getElementById('inputUpdateAt').value = formatDate(d?.updatedAt);
            const permissions = d?.permissions ?? []
            document.getElementById("detail-permissions").innerHTML = ""
            for (const permission of permissions) {
                document.getElementById("detail-permissions").innerHTML += `
                <span class="badge rounded-pill text-bg-secondary">
                    ${permission.name} - ${permission.code}
                </span>
            `
            }
        });
        this.disabled = false;
    }
</script>
<script th:inline="javascript">
    (function () {
        let currentUpdateRoleId = null;
        const modalEl = document.getElementById('popup-update');
        const nameInput = document.getElementById('input-name-update');
        const codeUpdateInput = document.getElementById('input-code-update');
        const codeNewInput = document.getElementById('input-code-new');
        const descriptionInput = document.getElementById('input-description-new');
        const permissionsContainer = document.getElementById('updatePermissionsGroups');
        const hiddenPermInput = document.getElementById('updatePermissionIdInputs');
        const selectAllCb = document.getElementById('updatePermSelectAll');
        const saveBtn = document.getElementById('btn-update-detail');

        // helper: chờ element(s) xuất hiện (polling)
        function waitFor(selector, timeout = 3000, interval = 100) {
            return new Promise((resolve, reject) => {
                const stopAt = Date.now() + timeout;
                (function poll() {
                    const nodes = document.querySelectorAll(selector);
                    if (nodes && nodes.length) return resolve(nodes);
                    if (Date.now() > stopAt) return resolve([]); // timeout -> trả về rỗng
                    setTimeout(poll, interval);
                })();
            });
        }

        // cập nhật giá trị hidden input dựa trên checkbox được tick
        function syncHiddenPermInput() {
            const checkedPerms = Array.from(permissionsContainer.querySelectorAll('.perm-checkbox:checked'))
                .map(cb => String(cb.getAttribute('data-perm-id')));
            // include parent-level checkboxes that are standalone (class parent-perm-checkbox) if they correspond to an actual permission id
            const checkedParents = Array.from(permissionsContainer.querySelectorAll('.parent-perm-checkbox:checked'))
                .map(cb => String(cb.getAttribute('data-perm-id')));
            const merged = Array.from(new Set([...checkedParents, ...checkedPerms]));
            hiddenPermInput.value = merged.join(',');
        }

        // cập nhật trạng thái parent (checked / indeterminate) dựa trên children
        function updateParentStates() {
            const parentCbs = permissionsContainer.querySelectorAll('.parent-perm-checkbox');
            parentCbs.forEach(parentCb => {
                const pid = parentCb.getAttribute('data-perm-id');
                const childCbs = permissionsContainer.querySelectorAll(`.perm-checkbox[data-parent-id="${pid}"]`);
                if (!childCbs.length) {
                    parentCb.indeterminate = false;
                    // nếu parent là permission duy nhất, leave as its checked state
                    return;
                }
                const checkedCount = Array.from(childCbs).filter(c => c.checked).length;
                if (checkedCount === 0) {
                    parentCb.checked = false;
                    parentCb.indeterminate = false;
                } else if (checkedCount === childCbs.length) {
                    parentCb.checked = true;
                    parentCb.indeterminate = false;
                } else {
                    parentCb.checked = false;
                    parentCb.indeterminate = true;
                }
            });
        }

        // cập nhật select-all checkbox dựa trên tất cả input hiện có
        function updateSelectAllState() {
            const allInputs = permissionsContainer.querySelectorAll('.parent-perm-checkbox, .perm-checkbox');
            if (!allInputs.length) {
                selectAllCb.checked = false;
                selectAllCb.indeterminate = false;
                return;
            }
            const checkedCount = Array.from(allInputs).filter(i => i.checked).length;
            if (checkedCount === 0) {
                selectAllCb.checked = false;
                selectAllCb.indeterminate = false;
            } else if (checkedCount === allInputs.length) {
                selectAllCb.checked = true;
                selectAllCb.indeterminate = false;
            } else {
                selectAllCb.checked = false;
                selectAllCb.indeterminate = true;
            }
        }

        // tick các checkbox tương ứng với danh sách permission ids (mảng hoặc string '1,2,3')
        function checkPermissionIds(perms) {
            if (!perms) perms = [];
            if (typeof perms === 'string') {
                perms = perms.split(',').map(s => s.trim()).filter(Boolean);
            }
            const set = new Set(perms.map(String));
            // bỏ hết checked trước
            permissionsContainer.querySelectorAll('.perm-checkbox, .parent-perm-checkbox').forEach(cb => {
                cb.checked = false;
                cb.indeterminate = false;
            });
            // tick theo set
            set.forEach(pid => {
                const cb = permissionsContainer.querySelector(`.perm-checkbox[data-perm-id="${pid}"], .parent-perm-checkbox[data-perm-id="${pid}"]`);
                if (cb) cb.checked = true;
            });
            // sau khi tick, cập nhật parent/indeterminate/selectAll/hidden
            updateParentStates();
            updateSelectAllState();
            syncHiddenPermInput();
        }

        // Hàm mở modal và đổ data (public)
        window.openUpdateRole = async function (id) {
            if (!id) return;
            currentUpdateRoleId = id;

            // show loading state trên modal (nếu cần)
            // fetch role detail
            try {
                const url = `/v1/api/roles/${id}/detail`;
                await callApi(url, {
                    method: 'GET',
                    headers: {'Content-Type': 'application/json'}
                }, async function (resp) {
                    const d = resp?.data ?? resp ?? {};
                    // điền thông tin vào các input
                    nameInput.value = d?.name ?? '';
                    codeUpdateInput.value = d?.code ?? '';
                    codeNewInput.value = d?.code ?? '';
                    descriptionInput.value = d?.description ?? '';
                    // permissions: lấy id list từ d.permissions
                    const perms = (d?.permissions ?? []).map(p => String(p.id));
                    // show modal (Bootstrap)
                    try {
                        // nếu bootstrap Modal chưa được khởi tạo, tạo mới
                        const modal = new bootstrap.Modal(modalEl, {});
                        modal.show();
                    } catch (e) {
                        // fallback: set attribute để show
                        modalEl.classList.add('show');
                        modalEl.style.display = 'block';
                    }

                    // Đợi UI permissions được render (checkboxes) — vì modal script gốc gọi loadPermissions() khi DOMContentLoaded
                    // chờ tối đa 3000ms
                    const nodes = await waitFor('#updatePermissionsGroups .perm-checkbox, #updatePermissionsGroups .parent-perm-checkbox', 3000);
                    if (!nodes.length) {
                        // nếu không có checkbox (chưa được load) thì cố gắng gọi nút reload permissions nếu có
                        const reloadBtn = document.getElementById('updatePermReloadBtn');
                        if (reloadBtn) reloadBtn.click();
                        // chờ thêm
                        await waitFor('#updatePermissionsGroups .perm-checkbox, #updatePermissionsGroups .parent-perm-checkbox', 3000);
                    }
                    // bây giờ tick các checkbox tương ứng
                    checkPermissionIds(perms);
                });
            } catch (err) {
                console.error('Lỗi khi lấy chi tiết role', err);
            }
        };

        // Gắn sự kiện cho nút Lưu: gửi PUT
        saveBtn.addEventListener('click', async function (ev) {
            if (!currentUpdateRoleId) {
                console.warn('Không có role id để update');
                return;
            }
            // thu dữ liệu từ input
            const payload = {
                name: nameInput.value?.trim() ?? '',
                // ưu tiên code mới nếu người dùng nhập
                code: (codeNewInput.value?.trim() || codeUpdateInput.value?.trim() || ''),
                description: descriptionInput.value?.trim() || ''
            };

            // lấy permission ids từ hidden (comma-separated) -> mảng số
            const permCsv = hiddenPermInput.value || '';
            const permIds = permCsv.split(',').map(s => s.trim()).filter(Boolean).map(s => {
                // nếu là numeric
                return isNaN(Number(s)) ? s : Number(s);
            });
            // backend có thể muốn key permission_ids hoặc permissionIds -> tùy backend
            // ở đây gửi cả 2 dạng để an toàn (nếu backend ignore thì OK)
            payload.permissionIds = permIds;
            payload.permission_ids = permIds;

            // (tuỳ nhu cầu bạn có thể thêm các field khác như default/isDelete)
            const url = `/v1/api/roles/${currentUpdateRoleId}`;
            // disable nút để tránh bấm tiếp
            saveBtn.disabled = true;
            try {
                await callApi(url, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                }, function (resp) {
                    // xử lý response
                    console.log('Update success', resp);
                    // ẩn modal
                    try {
                        const modal = bootstrap.Modal.getInstance(modalEl);
                        if (modal) modal.hide();
                    } catch (e) {
                        modalEl.classList.remove('show');
                        modalEl.style.display = 'none';
                    }
                    // Nếu bạn có 1 hàm reload bảng list role, gọi ở đây (ví dụ window.reloadRoleList && window.reloadRoleList())
                    if (typeof window.reloadRoleList === 'function') {
                        window.reloadRoleList();
                    }
                });
            } catch (err) {
                console.error('Lỗi khi update role', err);
                // có thể hiển thị lỗi lên UI ở đây
            } finally {
                saveBtn.disabled = false;
            }
        });

        // Đồng bộ hóa hidden input khi người dùng thay đổi checkbox thủ công (nếu modal scripts gốc không đã bind)
        // Lắng nghe event thay đổi ở phần permissions container (event delegation)
        permissionsContainer.addEventListener('change', function (e) {
            if (!e.target) return;
            const tgt = e.target;
            // nếu user tick/un-tick 1 checkbox child => cập nhật parent state
            if (tgt.classList.contains('perm-checkbox')) {
                const parentId = tgt.getAttribute('data-parent-id');
                if (parentId) {
                    // tính lại parent
                    const childCbs = permissionsContainer.querySelectorAll(`.perm-checkbox[data-parent-id="${parentId}"]`);
                    const parentCb = permissionsContainer.querySelector(`.parent-perm-checkbox[data-perm-id="${parentId}"]`);
                    if (parentCb) {
                        const checkedCount = Array.from(childCbs).filter(c => c.checked).length;
                        if (checkedCount === 0) {
                            parentCb.checked = false;
                            parentCb.indeterminate = false;
                        } else if (checkedCount === childCbs.length) {
                            parentCb.checked = true;
                            parentCb.indeterminate = false;
                        } else {
                            parentCb.checked = false;
                            parentCb.indeterminate = true;
                        }
                    }
                }
                // sync hidden & selectAll
                syncHiddenPermInput();
                updateSelectAllState();
            } else if (tgt.classList.contains('parent-perm-checkbox')) {
                // parent toggled -> tick/untick children if có
                const pid = tgt.getAttribute('data-perm-id');
                const childCbs = permissionsContainer.querySelectorAll(`.perm-checkbox[data-parent-id="${pid}"]`);
                if (childCbs.length) {
                    childCbs.forEach(ch => ch.checked = tgt.checked);
                } else {
                    // nothing
                }
                // reset indeterminate
                tgt.indeterminate = false;
                syncHiddenPermInput();
                updateSelectAllState();
            }
        });

        // Select All checkbox handling (nếu modal gốc chưa bind)
        selectAllCb.addEventListener('change', function () {
            const allCbs = permissionsContainer.querySelectorAll('.parent-perm-checkbox, .perm-checkbox');
            allCbs.forEach(cb => {
                cb.checked = selectAllCb.checked;
                if (cb.classList.contains('parent-perm-checkbox')) cb.indeterminate = false;
            });
            syncHiddenPermInput();
        });

    })();
</script>

</html>
