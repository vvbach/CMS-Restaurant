<html xmlns:th="http://www.thymeleaf.org" lang="vn">
<header th:fragment="header" id="header" class="header fixed-top d-flex align-items-center">
    <!-- Start Logo -->
    <div class="d-flex align-items-center justify-content-between">
        <a href="/" class="logo link-underline link-underline-opacity-0 d-flex align-items-center">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                <path d="M21 2V22H19V15H15V8C15 4.68629 17.6863 2 21 2ZM19 4.53C18.17 5 17 6.17 17 8V13H19V4.53ZM9 13.9V22H7V13.9C4.71776 13.4367 3 11.419 3 9V3H5V10H7V3H9V10H11V3H13V9C13 11.419 11.2822 13.4367 9 13.9Z">
                </path>
            </svg>
            <span class="d-none d-lg-block">BếpĂnVTIT</span>
        </a>
        <!--  Button toggling sidebar  -->
        <i class="bi bi-list toggle-sidebar-btn"></i>
    </div>

    <nav class="header-nav ms-auto">
        <ul class="d-flex align-items-center">
            <li class="nav-item dropdown pe-3">
                <a class="nav-link nav-profile d-flex align-items-center pe-0 loading" href="#"
                   data-bs-toggle="dropdown">
                    <img th:src="@{/img/default_pfp.jpg}" alt="Avatar" class="rounded-circle" id="header-avatar">
                    <span class="header-fullName d-none d-md-block dropdown-toggle ps-2"></span>
                </a><!-- End Profile Iamge Icon -->
                <ul class="dropdown-menu dropdown-menu-end dropdown-menu-arrow profile">
                    <li class="dropdown-header">
                        <h6 class="header-fullName"></h6>
                    </li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li>
                        <a class="dropdown-item d-flex align-items-center" href="/profile">
                            <i class="bi bi-person"></i>
                            <span>Account</span>
                        </a>
                    </li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li>
                        <a class="dropdown-item d-flex align-items-center" id="logout" href="#">
                            <i class="bi bi-box-arrow-right"></i>
                            <span>Log out</span>
                        </a>
                    </li>
                </ul><!-- End Profile Dropdown Items -->
            </li><!-- End Profile Nav -->
        </ul>
    </nav><!-- End Icons Navigation -->
    <script>
        document.getElementById('logout').addEventListener('click', async (e) => {
            e.preventDefault();
            const url = "/v1/api/auth/logout"
            await callApi(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            }, () => {
                deleteCookie("rememberMe")
                deleteCookie("token")
                deleteCookie("refreshToken")
                rolesPermissions.clearAuthCache()
                window.location.href = "/login"
            });
        })
    </script>
</header>
</html>
