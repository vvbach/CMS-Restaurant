<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml" lang="vn">
<main th:fragment="login">
    <div class="container">
        <section class="section register min-vh-100 d-flex flex-column align-items-center justify-content-center py-4">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-4 col-md-6 d-flex flex-column align-items-center justify-content-center">

                        <div class="d-flex justify-content-center py-4">
                            <a href="index.html" class="logo d-flex align-items-center w-auto">
                                <img th:src="@{/img/logo.png}" alt="">
                                <span class="d-none d-lg-block">BếpĂnVTIT</span>
                            </a>
                        </div><!-- End Logo -->

                        <div class="card mb-3">

                            <div class="card-body">

                                <div class="pt-4 pb-2">
                                    <h5 class="card-title text-center pb-0 fs-4">Đăng nhập</h5>
                                    <p class="text-center small">Hãy nhập tài khoản và mật khẩu để đăng nhập</p>
                                </div>

                                <form id="loginForm" class="row g-3 needs-validation" novalidate>

                                    <div class="col-12">
                                        <label for="yourUsername" class="form-label">Tài khoản</label>
                                        <div class="input-group has-validation">
                                            <span class="input-group-text" id="inputGroupPrepend">@</span>
                                            <input type="text" name="username" class="form-control" id="yourUsername"
                                                   required>
                                            <div class="invalid-feedback">Hãy nhập tài khoản của bạn!</div>
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <label for="yourPassword" class="form-label">Mật khẩu</label>

                                        <div class="input-group">
                                            <input type="password" name="password" class="form-control" id="yourPassword"
                                                   required>
                                            <button
                                                    class="btn btn-outline-secondary"
                                                    type="button"
                                                    id="togglePassword"
                                                    aria-label="Hiện mật khẩu">
                                                👁
                                            </button>
                                        </div>
                                        <div class="invalid-feedback">Hãy nhập mật khẩu của bạn!</div>
                                    </div>

                                    <div class="col-12">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" name="remember" value="true"
                                                   id="rememberMe">
                                            <label class="form-check-label" for="rememberMe">Lưu đăng nhập</label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <button id="loginBtn" class="btn btn-primary w-100">Đăng nhập</button>
                                    </div>
                                    <div class="col-12">
                                        <p class="small mb-0">Không có tài khoản?
                                            <a href="/register"> Đăng ký ngay</a>
                                        </p>
                                    </div>
                                </form>

                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </div>
    <script>
        window.addEventListener('load', () => {
            if (getCookie("token") && getCookie("refreshToken"))
                window.location.assign("/");
            else if (getCookie("changePasswordToken"))
                window.location.assign("/force-change-password");
        })

        document.getElementById('loginBtn').addEventListener('click', async function (e) {
            e.preventDefault();
            const form = document.getElementById('loginForm');

            const btn = this;
            btn.disabled = true;

            // Lấy dữ liệu form
            const formData = new FormData(form);

            // Chuyển FormData thành object
            const jsonObject = {};
            formData.forEach((value, key) => {
                jsonObject[key] = value;
            });

            try {
                const data = await callApi('/v1/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(jsonObject)
                }, (data) => {
                    if (!data.data.changePasswordRequired) {
                        if (document.getElementById('rememberMe').checked === true) {
                            setCookie("rememberMe", true, {days: 5})
                            setCookie("token", data.data.accessToken, {maxAge: 20});
                            setCookie("refreshToken", data.data.refreshToken, {days: 5});
                        } else {
                            setCookie("rememberMe", false);
                            setCookie("token", data.data.accessToken, {});
                            setCookie("refreshToken", data.data.refreshToken, {});
                        }
                        window.location.assign("/");
                    } else {
                        setCookie("changePasswordToken", data.data.changePasswordToken);
                        window.location.assign("/force-change-password")
                    }
                });
            } catch (err) {
                // đã show toast lỗi trong utils; vẫn có thể xử lý thêm ở đây nếu cần
                console.error(err);
            } finally {
                this.disabled = false;
            }
        });


        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('yourPassword');

            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';

            this.textContent = isPassword ? '🙈' : '👁';
        });
    </script>
</main>
</html>
