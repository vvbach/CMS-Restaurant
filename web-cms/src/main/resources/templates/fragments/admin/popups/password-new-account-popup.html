<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Password</title>
</head>
<body>
<div th:fragment="password-new-account-popup">
    <div class="modal fade" id="password-popup" tabindex="-1" aria-labelledby="passwordPopupLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="passwordPopupLabel">New account password</h5>
                    <button type="button" class="btn-close" onclick="closeAllModals()" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>A new account was created. Use the password below to sign in (please store it securely):</p>
                    <div class="input-group mb-3">
                        <input type="text" id="new-password-value" class="form-control" readonly aria-label="Generated password">
                        <button class="btn btn-outline-secondary" type="button" id="copy-new-password-btn">Copy</button>
                    </div>
                    <div id="password-popup-message" class="text-muted small"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light border" onclick="closeAllModals()"><i class="bi bi-x-circle"></i> Close</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // copy button behavior
    (function () {
        const copyBtn = document.getElementById('copy-new-password-btn');
        if (!copyBtn) return;
        copyBtn.addEventListener('click', () => {
            const input = document.getElementById('new-password-value');
            if (!input) return;
            input.select();
            try {
                document.execCommand('copy');
                copyBtn.textContent = 'Copied';
                setTimeout(() => copyBtn.textContent = 'Copy', 1500);
            } catch (e) {
                // clipboard API fallback
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(input.value).then(() => {
                        copyBtn.textContent = 'Copied';
                        setTimeout(() => copyBtn.textContent = 'Copy', 1500);
                    });
                }
            }
        });
    })();
</script>

</body>
</html>
