<html xmlns:th="http://www.thymeleaf.org" lang="vn">
<div th:fragment="restore-account-popup"
     class="modal modal-sm fade clearfix" th:id="restore-account-popup" tabindex="-1"
     aria-labelledby="myModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title">Bạn có chắc chắn muốn khôi phục tài khoản này không?</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-footer d-flex justify-content-between">
                <button type="button" class="btn btn-success" data-bs-dismiss="modal" onclick="restoreAccount()">Khôi phục</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
</html>
