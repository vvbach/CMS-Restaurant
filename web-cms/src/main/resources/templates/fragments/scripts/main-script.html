<html xmlns:th="http://www.thymeleaf.org" lang="vn">
<div th:fragment="main-script">
    <!-- Vendor JS Files -->
    <script th:src="@{/vendor/apexcharts/apexcharts.min.js}" async></script>
    <script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}" async></script>
    <script th:src="@{/vendor/chart.js/chart.umd.js}" async></script>
    <script th:src="@{/vendor/echarts/echarts.min.js}" async></script>
    <script th:src="@{/vendor/quill/quill.min.js}" async></script>
    <script th:src="@{/vendor/simple-datatables/simple-datatables.js}" defer></script>
    <script th:src="@{/vendor/tinymce/tinymce.min.js}" async></script>
    <script th:src="@{/vendor/php-email-form/validate.js}" async></script>

    <!-- Template Main JS File -->
    <script th:src="@{/js/main.js}" async></script>

    <script th:replace="~{/fragments/scripts/essential-script :: essential-script}"></script>
    <script>
        const mapIsDelete = (v) => v === 'YES' ? 'Đã xóa' : v === 'NO' ? 'Đang sử dụng' : '-';

        const mapStatus = (s) => ({
            Draft: 'Nháp',
            Publish: 'Đã xuất bản',
            Unpublish: 'Đã huỷ Xuất bản',
            Rejected: 'Từ chối',
            PendingApproval: 'Chờ duyệt',
            Approved: 'Đã phê duyệt',
        }[s] ?? (s || '-'));

        const mapGender = (s) => ({
            MALE: 'Nam',
            FEMALE: 'Nữ',
            OTHER: 'Khác'
        }[s] ?? (s || '-'))

        function setPage(page) {
            const li = document.querySelector('#pagination .page-link').closest('.page-item');
            if (page === '+') {
                if (currentPage + 1 <= maxPage) {
                    currentPage = currentPage + 1;
                }
            } else if (page === '-') {
                if (currentPage - 1 > 0) {
                    currentPage = currentPage - 1;
                }
            } else {
                currentPage = page;
            }

            pagination.querySelectorAll('.page-item').forEach(item => item.classList.remove('active'));

            document.querySelectorAll('#pagination .page-link')
                .forEach(a => a.classList.remove('selected'));

            const link = document.querySelector(`#pagination .page-link[data-page="${currentPage}"]`);
            if (link) {
                link.classList.add('selected');
            }

            updatePaginationUI(li)
            handleFilter()
        }

        function createListPage() {
            document.getElementById('pagination').innerHTML = `
              <li class="page-item disabled" id="btn-pag-prev"><a class="page-link" onclick="setPage('-')">Previous</a></li>
            `;

            for (let i = 1; i <= maxPage; i++) {
                const li = document.createElement('li');
                li.className = 'page-item';
                if (i === currentPage) {
                    li.innerHTML = `<a class="page-link selected" data-page="${i}" onclick="setPage(${i})">${i}</a>`;
                } else {
                    li.innerHTML = `<a class="page-link" data-page="${i}" onclick="setPage(${i})">${i}</a>`;
                }
                document.getElementById('pagination').appendChild(li);
            }

            if (maxPage > 1) {
                document.getElementById('pagination').innerHTML += `
                  <li class="page-item" id="btn-pag-next"><a class="page-link" onclick="setPage('+')">Next</a></li>
                `;
            }
        }

        function updatePaginationUI(clickedLi) {
            this.disabled = true;
            // Xóa active cũ
            pagination.querySelectorAll('.page-item').forEach(item => item.classList.remove('active'));
            // Đặt active mới nếu click vào số
            if (clickedLi) clickedLi.classList.add('active');
            else {
                // Nếu đổi page qua prev/next thì set active cho đúng số
                const newActive = pagination.querySelector(`.page-link[data-page="${currentPage}"]`);
                if (newActive) newActive.closest('.page-item').classList.add('active');
            }

            // Enable/Disable Previous
            if (currentPage <= 1) {
                document.getElementById('btn-pag-prev').classList.add('disabled');
                document.getElementById('btn-pag-next').classList.remove('disabled');
            } else if (currentPage >= maxPage) {
                document.getElementById('btn-pag-next').classList.add('disabled');
                document.getElementById('btn-pag-prev').classList.remove('disabled');
            }
        }
    </script>

    <script>
        // ====== Config chuyển trạng thái ======
        const MAP = {
            Draft: {
                step: 1,
                header: {text: 'Draft', cls: 'text-bg-secondary'},
                field: 'Nháp',
                toast: 'Đã chuyển về bản nháp.'
            },
            PendingApproval: {
                step: 2,
                header: {text: 'Pending Approval', cls: 'text-bg-primary'},
                field: 'Gửi duyệt',
                toast: 'Đã gửi duyệt.'
            },
            Approve: {
                step: 3,
                header: {text: 'Approved', cls: 'text-bg-info'},
                field: 'Đã duyệt',
                toast: 'Đã duyệt nội dung.'
            },
            Publish: {
                step: 4,
                header: {text: 'Published', cls: 'text-bg-success'},
                field: 'Xuất bản',
                toast: 'Nội dung đã xuất bản!'
            },
            Reject: {
                step: 1,
                header: {text: 'Rejected', cls: 'text-bg-danger'},
                field: 'Bị từ chối',
                toast: 'Yêu cầu đã bị từ chối.'
            },
            Unpublish: {
                step: 3,
                header: {text: 'Unpublished', cls: 'text-bg-warning'},
                field: 'Gỡ xuống',
                toast: 'Đã gỡ xuống (unpublish).'
            }
        };

        // ====== Helpers ======
        function setProgress(activeIndex) {
            const steps = document.querySelectorAll('.step');
            steps.forEach(s => {
                const idx = +s.dataset.index;
                s.classList.toggle('done', idx <= activeIndex);
                s.classList.toggle('active', idx === activeIndex);
            });
            const total = steps.length;
            const pct = (activeIndex - 1) / (total - 1) * 100;
            document.getElementById('progressed').style.width = pct + '%';
        }

        function updateHeader({text, cls}) {
            const el = document.getElementById('headerState');
            el.className = 'badge state-badge ' + cls;
            el.textContent = text;
        }

        // ====== Bind dropdown actions ======
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const key = btn.getAttribute('data-action');
            const conf = MAP[key];
            if (!conf) return;

            setProgress(conf.step);
            updateHeader(conf.header);
            document.getElementById('statusField').value = conf.field;

            if (conf.header.text === 'Rejected'
                || conf.header.text === 'Unpublished') {
                document.getElementById('reason').classList.remove("d-none");
            } else {
                document.getElementById('reason').classList.add("d-none");
            }
        });

        function closeAllModals() {
            const openModals = document.querySelectorAll('.modal.show');

            openModals.forEach(modalEl => {
                const modalInstance = bootstrap.Modal.getInstance(modalEl);
                if (modalInstance) {
                    modalInstance.hide();
                }
            });
        }
    </script>
    <script>
        // Helper function
        let domReady = (cb) => {
            document.readyState === 'complete'
                ? cb()
                : document.addEventListener('DOMContentLoaded', cb);
        };

        domReady(() => {
            // Display body when DOM is loaded
            document.body.style.visibility = 'visible';
        });
    </script>
    <script>
        window.authReady = window.authReady ?? (async () => {
            try {
                await rolesPermissions.loadProfile({
                    onError: (err) => {
                        showErrorDialog(err?.message || "Permission load failed");
                    }
                });
            } catch (e) {
                console.error("authReady failed", e);
            }
        })();
    </script>

    <script>
        (async () => {
            await window.authReady;

            const uiNavItems = [
                "layoutPageNavItem",
                "categoryPageNavItem",
                "homePageNavItem",
                "aboutPageNavItem",
                "contactPageNavItem"
            ];

            const productNavItems = [
                "productNavItem",
                "categoryNavItem"
            ];

            if (!rolesPermissions.hasPermission("UI_READ")) {
                uiNavItems.forEach(removeIfExists);
            }

            if (!rolesPermissions.hasPermission("PRODUCT_READ")) {
                productNavItems.forEach(removeIfExists);
            }

            if (!rolesPermissions.hasPermission("ROLE_READ")) {
                removeIfExists("roleNavItem");
            }

            if (!rolesPermissions.hasPermission("USER_READ")) {
                removeIfExists("adminNavItem");
            }
        })();

        function removeIfExists(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
    </script>

</div>
</html>
