server:
  port: 8111
  servlet:
    context-path: /api-business

spring:
  application:
    name: api-business
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  data:
    redis:
      host: vvbach-linux
      port: 6379
  cache:
    type: redis

  datasource:
    url: jdbc:postgresql://vvbach-linux:5432/business
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 3000
      idle-timeout: 6000
      max-lifetime: 18000
      maximum-pool-size: 3
      validation-timeout: 5000
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect